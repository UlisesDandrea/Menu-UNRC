name: 🍽️ Obtener Menú UNRC

on:
  schedule:
    - cron: '0,5,10,15,20,25 11 * * 1-5'
    - cron: '45 11 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-menu:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # <--- Veloz: no descarga librerías dos veces

      - name: 📦 Instalar dependencias Python
        run: |
          pip install -r requirements.txt

      # ESTE ES EL PASO QUE TE FALTABA O ESTABA FALLANDO
      - name: 🌐 Instalar Navegador y Dependencias
        run: |
          python -m playwright install --with-deps chromium

      - name: 🤖 Correr el bot
        env:
          UNRC_DNI:      ${{ secrets.UNRC_DNI }}
          UNRC_PASSWORD: ${{ secrets.UNRC_PASSWORD }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: |
          cd bot
          python scraper.py

      - name: 📧 Mandar mail con screenshot
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ulisesdogo2004@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🍽️ Menú UNRC - Reporte"
          to: ulisesdogo2004@gmail.com
          from: ulisesdogo2004@gmail.com
          body: "Proceso terminado. Adjunto evidencia."
          attachments: bot/menu_*.png

      - name: 📸 Guardar screenshot como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: menu-screenshot
          path: bot/menu_*.png
          retention-days: 7
