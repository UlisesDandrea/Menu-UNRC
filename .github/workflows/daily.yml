name: 🍽️ Obtener Menú UNRC

on:
  schedule:
    # Ráfaga de intentos cada 5 min entre las 08:00 y 08:25 AM Arg (11:00-11:25 UTC)
    - cron: '0,5,10,15,20,25 11 * * 1-5'
    # Respaldo a las 08:45 AM Arg
    - cron: '0 14 * * 1-5'
  
  workflow_dispatch: # Botón manual para probar ahora mismo

jobs:
  scrape-menu:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # <--- MEJORA 1: Cache de librerías (ahorra ~30 seg)

      - name: 📦 Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: 🌐 Instalar Playwright y Dependencias
        run: |
          # MEJORA 2: Instalación oficial ultra rápida
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: 🤖 Correr el bot
        env:
          UNRC_DNI:      ${{ secrets.UNRC_DNI }}
          UNRC_PASSWORD: ${{ secrets.UNRC_PASSWORD }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: |
          cd bot
          python scraper.py

      - name: 📧 Mandar mail con screenshot
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ulisesdogo2004@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🍽️ Menú UNRC - Reporte"
          to: ulisesdogo2004@gmail.com
          from: ulisesdogo2004@gmail.com
          body: "El bot corrió. Adjunto el screenshot del menú."
          attachments: bot/menu_*.png

      - name: 📸 Guardar screenshot como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: menu-screenshot
          path: bot/menu_*.png
          retention-days: 7
