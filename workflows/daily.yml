name: 🍽️ Obtener Menú UNRC

on:
  schedule:
    # 8:00 AM Argentina (ART = UTC-3) → 11:00 AM UTC
    - cron: '0 11 * * 1-5'   # Lunes a Viernes
  workflow_dispatch:          # Permite correrlo manualmente también

jobs:
  scrape-menu:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🤖 Correr el bot
        env:
          UNRC_DNI:      ${{ secrets.UNRC_DNI }}
          UNRC_PASSWORD: ${{ secrets.UNRC_PASSWORD }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: |
          cd bot
          python scraper.py

      - name: 📸 Guardar screenshot como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: menu-screenshot
          path: bot/menu_*.png
          retention-days: 7
